<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Arushi</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #feda75, #fa7e1e, #d62976, #962fbf, #4f5bd5);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    }

    h1 {
      font-size: 2em;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.1em;
      margin-bottom: 20px;
    }

    #qrcode {
      margin: 20px auto;
      display: flex;
      justify-content: center;
      background: white;
      padding: 10px;
      border-radius: 15px;
      width: fit-content;
    }

    .upi-button,
    .download-btn {
      display: block;
      width: 100%;
      box-sizing: border-box;
      background: #fff;
      color: #d62976;
      font-weight: bold;
      padding: 15px;
      border-radius: 30px;
      text-decoration: none;
      font-size: 1.1em;
      transition: .3s;
      border: none;
      cursor: pointer;
      margin-top: 15px;
    }

    .upi-button:hover,
    .download-btn:hover {
      background: #d62976;
      color: white;
    }
  </style>
</head>
<body>

<div class="card">

  <h1>Support My Work 💖<br>@princess_1_r_k_m</h1>

  <p>Your contribution helps me keep creating!</p>

  <!-- QR Code -->
  <div id="qrcode"></div>

  <!-- Pay Button -->
  <a id="upiLink" class="upi-button">
    💳 Pay via UPI
  </a>

  <!-- Download Button -->
  <button class="download-btn" onclick="downloadQR()">
    ⬇️ Download QR Code
  </button>

</div>

<script>
  // ====== CHANGE THESE ======
  const upiID = "princessrkm@ybl";   // Replace with your UPI ID
  const name = "Arushi";
  // ==========================

  const upiLink =
    `upi://pay?pa=${encodeURIComponent(upiID)}&pn=${encodeURIComponent(name)}`;

  document.getElementById("upiLink").href = upiLink;

 new QRCode(document.getElementById("qrcode"), {
    text: upiLink,
    width: 220,
    height: 220,
    colorDark: "#000000",
    colorLight: "#ffffff"
});

  function downloadQR() {
    const canvas = document.querySelector("#qrcode canvas");
    const img = document.querySelector("#qrcode img");

    const link = document.createElement("a");
    link.download = "Arushi-UPI-QR.png";

    if (canvas) {
      link.href = canvas.toDataURL("image/png");
    } else if (img) {
      link.href = img.src;
    } else {
      alert("QR code not found.");
      return;
    }

    link.click();
  }
</script>

</body>
</html>
